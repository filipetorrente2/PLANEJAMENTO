
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;}

/* NAV */
.nav{display:flex;gap:4px;padding:16px 16px 0;border-bottom:1px solid var(--color-border-tertiary);margin-bottom:0;}
.nav-btn{padding:8px 16px;border:none;background:none;color:var(--color-text-secondary);cursor:pointer;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--font-sans);}
.nav-btn.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500;}

/* VIEWS */
.view{display:none;padding:16px;}
.view.active{display:block;}

/* WEEK SELECTOR */
.week-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.week-bar select{background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);color:var(--color-text-primary);padding:6px 10px;border-radius:6px;font-size:13px;font-family:var(--font-sans);}
.btn-sm{background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);color:var(--color-text-primary);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-sans);}
.btn-sm:hover{background:var(--color-background-tertiary);}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.btn-primary:hover{opacity:0.85;}
.btn-danger{background:none;border:1px solid #e05a5a;color:#e05a5a;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font-sans);}

/* CALENDAR GRID */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px;}
.day-col{background:var(--color-background-secondary);border-radius:8px;padding:10px 8px;min-height:120px;border:1px solid var(--color-border-tertiary);}
.day-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.post-chip{border-radius:5px;padding:4px 7px;font-size:11px;margin-bottom:4px;cursor:pointer;line-height:1.4;word-break:break-word;}
.post-chip:hover{opacity:0.8;}
.chip-reel-alcance{background:#E6F1FB;color:#0C447C;}
.chip-reel-oferta{background:#EEEDFE;color:#3C3489;}
.chip-reel-lo-fi{background:#E1F5EE;color:#085041;}
.chip-reel-ia{background:#FEF3E6;color:#7A3B00;}
.chip-reel-audio{background:#FAEEDA;color:#633806;}
.chip-carrossel-emocional{background:#FCE8F3;color:#7A0040;}
.chip-carrossel-oferta{background:#E8F0FC;color:#1A3A7A;}
.add-post-btn{width:100%;background:none;border:1px dashed var(--color-border-secondary);color:var(--color-text-tertiary);border-radius:5px;padding:4px;font-size:11px;cursor:pointer;margin-top:4px;}
.add-post-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-secondary);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--color-background-primary);border-radius:12px;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid var(--color-border-secondary);}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);color:var(--color-text-primary);padding:8px 10px;border-radius:6px;font-size:13px;font-family:var(--font-sans);}
.field textarea{resize:vertical;min-height:60px;}
.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

/* STATS VIEW */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--color-background-secondary);border-radius:8px;padding:14px;border:1px solid var(--color-border-tertiary);}
.stat-num{font-size:24px;font-weight:500;color:var(--color-text-primary);}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:3px;}
.stat-delta{font-size:11px;margin-top:4px;}
.delta-up{color:#2E7D32;}
.delta-down{color:#C62828;}

/* TABLE */
.posts-table{width:100%;border-collapse:collapse;}
.posts-table th{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--color-border-tertiary);}
.posts-table td{padding:8px 10px;border-bottom:1px solid var(--color-border-tertiary);font-size:12px;vertical-align:middle;}
.posts-table tr:hover td{background:var(--color-background-secondary);}

/* RANKING */
.rank-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--color-background-secondary);border-radius:8px;margin-bottom:8px;border:1px solid var(--color-border-tertiary);}
.rank-pos{font-size:18px;font-weight:500;color:var(--color-text-tertiary);width:28px;flex-shrink:0;}
.rank-info{flex:1;}
.rank-title{font-size:13px;font-weight:500;}
.rank-meta{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.rank-views{font-size:16px;font-weight:500;color:var(--color-text-primary);flex-shrink:0;}

.section-title{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--color-text-primary);}
.empty-state{text-align:center;padding:40px 20px;color:var(--color-text-tertiary);font-size:13px;}

/* WEEK PILLS */
.week-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.week-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary);font-size:12px;cursor:pointer;font-family:var(--font-sans);}
.week-pill.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-btn active" onclick="switchView('calendar')">📅 Calendário</button>
  <button class="nav-btn" onclick="switchView('stats')">📊 Métricas</button>
  <button class="nav-btn" onclick="switchView('ranking')">🏆 Ranking</button>
</div>

<!-- CALENDAR VIEW -->
<div class="view active" id="view-calendar">
  <div class="week-bar">
    <select id="week-select" onchange="renderCalendar()"></select>
    <button class="btn-sm" onclick="addWeek()">+ Nova semana</button>
    <span style="margin-left:auto;font-size:12px;color:var(--color-text-tertiary)" id="week-posts-count"></span>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
    <span style="font-size:11px;color:var(--color-text-secondary);margin-right:4px;">Legenda:</span>
    <span class="post-chip chip-reel-alcance" style="cursor:default">Reel Alcance</span>
    <span class="post-chip chip-reel-oferta" style="cursor:default">Reel Oferta</span>
    <span class="post-chip chip-reel-lo-fi" style="cursor:default">Reel Lo-fi</span>
    <span class="post-chip chip-reel-ia" style="cursor:default">Reel IA</span>
    <span class="post-chip chip-reel-audio" style="cursor:default">Reel Áudio</span>
    <span class="post-chip chip-carrossel-emocional" style="cursor:default">Carrossel Emocional</span>
    <span class="post-chip chip-carrossel-oferta" style="cursor:default">Carrossel Oferta</span>
  </div>
</div>

<!-- STATS VIEW -->
<div class="view" id="view-stats">
  <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:13px;font-weight:500;">Semana:</span>
    <div class="week-pills" id="stats-week-pills" style="margin-bottom:0;"></div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="section-title">Todos os posts</div>
  <div id="stats-table-wrap"></div>
</div>

<!-- RANKING VIEW -->
<div class="view" id="view-ranking">
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    <select id="rank-metric" onchange="renderRanking()" style="background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);color:var(--color-text-primary);padding:6px 10px;border-radius:6px;font-size:13px;font-family:var(--font-sans);">
      <option value="views">Views</option>
      <option value="likes">Curtidas</option>
      <option value="saves">Salvamentos</option>
      <option value="reach">Alcance</option>
      <option value="comments">Comentários</option>
    </select>
    <select id="rank-type" onchange="renderRanking()" style="background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);color:var(--color-text-primary);padding:6px 10px;border-radius:6px;font-size:13px;font-family:var(--font-sans);">
      <option value="all">Todos os tipos</option>
      <option value="reel-alcance">Reel Alcance</option>
      <option value="reel-oferta">Reel Oferta</option>
      <option value="reel-lo-fi">Reel Lo-fi</option>
      <option value="reel-ia">Reel IA</option>
      <option value="reel-audio">Reel Áudio</option>
      <option value="carrossel-emocional">Carrossel Emocional</option>
      <option value="carrossel-oferta">Carrossel Oferta</option>
    </select>
  </div>
  <div class="section-title">Top posts por métrica</div>
  <div id="ranking-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Novo post</h3>
    <div class="field">
      <label>Título / Tema</label>
      <input type="text" id="f-title" placeholder="Ex: O erro que afasta pacientes"/>
    </div>
    <div class="field">
      <label>Tipo de conteúdo</label>
      <select id="f-type">
        <option value="reel-alcance">Reel — Alcance</option>
        <option value="reel-oferta">Reel — Oferta</option>
        <option value="reel-lo-fi">Reel — Lo-fi / Papo reto</option>
        <option value="reel-ia">Reel — IA</option>
        <option value="reel-audio">Reel — Áudio engraçado</option>
        <option value="carrossel-emocional">Carrossel — Emocional</option>
        <option value="carrossel-oferta">Carrossel — Oferta</option>
      </select>
    </div>
    <div class="field">
      <label>Observações / ideia</label>
      <textarea id="f-notes" placeholder="Gancho, ângulo, referência..."></textarea>
    </div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;">Métricas (preencha após postar)</div>
    <div class="metric-row">
      <div class="field"><label>Views</label><input type="number" id="f-views" placeholder="0"/></div>
      <div class="field"><label>Curtidas</label><input type="number" id="f-likes" placeholder="0"/></div>
    </div>
    <div class="metric-row">
      <div class="field"><label>Alcance</label><input type="number" id="f-reach" placeholder="0"/></div>
      <div class="field"><label>Salvamentos</label><input type="number" id="f-saves" placeholder="0"/></div>
    </div>
    <div class="metric-row">
      <div class="field"><label>Comentários</label><input type="number" id="f-comments" placeholder="0"/></div>
      <div class="field"><label>Novos seguidores</label><input type="number" id="f-followers" placeholder="0"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="savePost()">Salvar</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const TYPE_LABELS = {
  'reel-alcance':'Reel Alcance','reel-oferta':'Reel Oferta','reel-lo-fi':'Reel Lo-fi',
  'reel-ia':'Reel IA','reel-audio':'Reel Áudio',
  'carrossel-emocional':'Carrossel Emocional','carrossel-oferta':'Carrossel Oferta'
};
const METRIC_LABELS = {views:'Views',likes:'Curtidas',saves:'Salvamentos',reach:'Alcance',comments:'Comentários'};

let state = {weeks:[], posts:[]};
let editingPost = null;
let pendingDay = null;
let pendingWeek = null;
let activeStatsWeek = null;

async function load(){
  try {
    const r = await window.storage.get('instagram-planner-v2');
    if(r && r.value) state = JSON.parse(r.value);
  } catch(e){}
  if(!state.weeks || state.weeks.length===0){
    state.weeks = [currentWeekLabel()];
    state.posts = [];
  }
  if(!activeStatsWeek) activeStatsWeek = state.weeks[state.weeks.length-1];
  buildWeekSelect();
  renderCalendar();
  renderStats();
  renderRanking();
}

async function save(){
  try { await window.storage.set('instagram-planner-v2', JSON.stringify(state)); } catch(e){}
}

function currentWeekLabel(){
  const now = new Date();
  const d = now.getDay();
  const diff = now.getDate() - d + (d===0?-6:1);
  const mon = new Date(now.setDate(diff));
  return `Semana ${mon.getDate().toString().padStart(2,'0')}/${(mon.getMonth()+1).toString().padStart(2,'0')}`;
}

function buildWeekSelect(){
  const sel = document.getElementById('week-select');
  sel.innerHTML = '';
  state.weeks.forEach(w=>{
    const o = document.createElement('option');
    o.value = w; o.textContent = w;
    sel.appendChild(o);
  });
  sel.value = state.weeks[state.weeks.length-1];
}

function addWeek(){
  const label = prompt('Nome da semana (ex: Semana 16/06):', currentWeekLabel());
  if(!label) return;
  if(!state.weeks.includes(label)) state.weeks.push(label);
  buildWeekSelect();
  document.getElementById('week-select').value = label;
  save();
  renderCalendar();
}

function renderCalendar(){
  const week = document.getElementById('week-select').value;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const weekPosts = state.posts.filter(p=>p.week===week);
  document.getElementById('week-posts-count').textContent = `${weekPosts.length} post${weekPosts.length!==1?'s':''} planejado${weekPosts.length!==1?'s':''}`;

  DAYS.forEach((day,i)=>{
    const col = document.createElement('div');
    col.className = 'day-col';
    const lbl = document.createElement('div');
    lbl.className = 'day-label'; lbl.textContent = day;
    col.appendChild(lbl);

    const dayPosts = weekPosts.filter(p=>p.day===i);
    dayPosts.forEach(p=>{
      const chip = document.createElement('div');
      chip.className = `post-chip chip-${p.type}`;
      chip.textContent = p.title || TYPE_LABELS[p.type];
      chip.title = p.notes||'';
      chip.onclick = ()=>openModal(p.id, i, week);
      col.appendChild(chip);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-post-btn';
    addBtn.textContent = '+ post';
    addBtn.onclick = ()=>openModal(null, i, week);
    col.appendChild(addBtn);
    grid.appendChild(col);
  });
}

function openModal(postId, day, week){
  editingPost = postId;
  pendingDay = day;
  pendingWeek = week;
  const modal = document.getElementById('modal');
  const post = postId ? state.posts.find(p=>p.id===postId) : null;
  document.getElementById('modal-title').textContent = post ? 'Editar post' : `Novo post — ${DAYS[day]}`;
  document.getElementById('f-title').value = post?.title||'';
  document.getElementById('f-type').value = post?.type||'reel-lo-fi';
  document.getElementById('f-notes').value = post?.notes||'';
  document.getElementById('f-views').value = post?.views||'';
  document.getElementById('f-likes').value = post?.likes||'';
  document.getElementById('f-reach').value = post?.reach||'';
  document.getElementById('f-saves').value = post?.saves||'';
  document.getElementById('f-comments').value = post?.comments||'';
  document.getElementById('f-followers').value = post?.followers||'';

  if(post){
    const existing = document.getElementById('del-btn');
    if(!existing){
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-danger';
      delBtn.id = 'del-btn';
      delBtn.textContent = 'Excluir';
      delBtn.onclick = ()=>deletePost(postId);
      document.querySelector('.modal-actions').prepend(delBtn);
    }
  } else {
    const d = document.getElementById('del-btn');
    if(d) d.remove();
  }

  modal.classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  editingPost = null;
}

function savePost(){
  const title = document.getElementById('f-title').value.trim();
  const type = document.getElementById('f-type').value;
  const notes = document.getElementById('f-notes').value.trim();
  const views = parseInt(document.getElementById('f-views').value)||0;
  const likes = parseInt(document.getElementById('f-likes').value)||0;
  const reach = parseInt(document.getElementById('f-reach').value)||0;
  const saves = parseInt(document.getElementById('f-saves').value)||0;
  const comments = parseInt(document.getElementById('f-comments').value)||0;
  const followers = parseInt(document.getElementById('f-followers').value)||0;

  if(!title){alert('Coloca um título pro post.');return;}

  if(editingPost){
    const p = state.posts.find(x=>x.id===editingPost);
    if(p) Object.assign(p,{title,type,notes,views,likes,reach,saves,comments,followers});
  } else {
    state.posts.push({id:Date.now().toString(),week:pendingWeek,day:pendingDay,title,type,notes,views,likes,reach,saves,comments,followers});
  }
  save();
  closeModal();
  renderCalendar();
  renderStats();
  renderRanking();
}

function deletePost(id){
  if(!confirm('Excluir este post?')) return;
  state.posts = state.posts.filter(p=>p.id!==id);
  save();
  closeModal();
  renderCalendar();
  renderStats();
  renderRanking();
}

function renderStats(){
  // Pills
  const pillsEl = document.getElementById('stats-week-pills');
  pillsEl.innerHTML = '';
  state.weeks.forEach(w=>{
    const btn = document.createElement('button');
    btn.className = 'week-pill' + (w===activeStatsWeek?' active':'');
    btn.textContent = w;
    btn.onclick = ()=>{activeStatsWeek=w;renderStats();};
    pillsEl.appendChild(btn);
  });

  const posts = state.posts.filter(p=>p.week===activeStatsWeek);
  const total = (key)=>posts.reduce((s,p)=>s+(p[key]||0),0);
  const allPosts = state.posts;

  // Compare with previous week
  const wIdx = state.weeks.indexOf(activeStatsWeek);
  const prevWeek = wIdx>0?state.weeks[wIdx-1]:null;
  const prevPosts = prevWeek?state.posts.filter(p=>p.week===prevWeek):[];
  const prevTotal = (key)=>prevPosts.reduce((s,p)=>s+(p[key]||0),0);

  const metrics = [
    {key:'views',label:'Total Views',icon:'👁'},
    {key:'reach',label:'Alcance total',icon:'📡'},
    {key:'likes',label:'Curtidas',icon:'❤️'},
    {key:'saves',label:'Salvamentos',icon:'🔖'},
    {key:'comments',label:'Comentários',icon:'💬'},
    {key:'followers',label:'Novos seguidores',icon:'👥'},
  ];

  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  metrics.forEach(m=>{
    const val = total(m.key);
    const prev = prevTotal(m.key);
    const delta = prev>0?Math.round((val-prev)/prev*100):null;
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `
      <div class="stat-num">${val.toLocaleString('pt-BR')}</div>
      <div class="stat-label">${m.icon} ${m.label}</div>
      ${delta!==null?`<div class="stat-delta ${delta>=0?'delta-up':'delta-down'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}% vs semana anterior</div>`:''}
    `;
    grid.appendChild(card);
  });

  // Table
  const wrap = document.getElementById('stats-table-wrap');
  if(posts.length===0){
    wrap.innerHTML = '<div class="empty-state">Nenhum post registrado nessa semana ainda.</div>';
    return;
  }
  let html = `<table class="posts-table"><thead><tr>
    <th>Post</th><th>Tipo</th><th>Views</th><th>Alcance</th><th>Curtidas</th><th>Salv.</th><th>Coment.</th>
  </tr></thead><tbody>`;
  posts.forEach(p=>{
    html += `<tr>
      <td style="font-weight:500;max-width:160px;">${p.title}</td>
      <td><span class="badge chip-${p.type}">${TYPE_LABELS[p.type]||p.type}</span></td>
      <td>${(p.views||0).toLocaleString('pt-BR')}</td>
      <td>${(p.reach||0).toLocaleString('pt-BR')}</td>
      <td>${(p.likes||0).toLocaleString('pt-BR')}</td>
      <td>${(p.saves||0).toLocaleString('pt-BR')}</td>
      <td>${(p.comments||0).toLocaleString('pt-BR')}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderRanking(){
  const metric = document.getElementById('rank-metric').value;
  const typeFilter = document.getElementById('rank-type').value;
  let posts = [...state.posts];
  if(typeFilter!=='all') posts = posts.filter(p=>p.type===typeFilter);
  posts.sort((a,b)=>(b[metric]||0)-(a[metric]||0));
  const top = posts.slice(0,10);
  const el = document.getElementById('ranking-list');
  if(top.length===0){
    el.innerHTML = '<div class="empty-state">Nenhum post com métricas registradas ainda.</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = top.map((p,i)=>`
    <div class="rank-item">
      <div class="rank-pos">${medals[i]||i+1}</div>
      <div class="rank-info">
        <div class="rank-title">${p.title}</div>
        <div class="rank-meta">${p.week} · ${DAYS[p.day]} · <span class="badge chip-${p.type}">${TYPE_LABELS[p.type]||p.type}</span></div>
      </div>
      <div class="rank-views">${(p[metric]||0).toLocaleString('pt-BR')}<br><span style="font-size:10px;color:var(--color-text-secondary);font-weight:400">${METRIC_LABELS[metric]}</span></div>
    </div>
  `).join('');
}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  event.target.classList.add('active');
  if(v==='stats') renderStats();
  if(v==='ranking') renderRanking();
}

document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

load();
</script>
</body>
</html>
